<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Golden Feather · Modular Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
    body { background: #0a0a0a; color: #f0f0f0; min-height: 100vh; display: flex; justify-content: center; align-items: center; }
    #app { width: 100%; max-width: 1400px; margin: 20px; background: #0f0f0f; border-radius: 32px; box-shadow: 0 25px 50px -12px black; overflow: hidden; border: 1px solid rgba(212,175,55,0.2); }
    .glass { background: rgba(30,30,30,0.7); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(212,175,55,0.3); }
    .header { padding: 20px 24px; display: flex; justify-content: space-between; align-items: center; }
    .header h1 { font-size: 1.8rem; color: #d4af37; display: flex; align-items: center; gap: 10px; }
    .header .user-info { display: flex; align-items: center; gap: 20px; }
    .header select, .header button { background: #2a2a2a; border: 1px solid #d4af3740; color: white; padding: 8px 16px; border-radius: 40px; cursor: pointer; }
    .main-content { display: flex; height: calc(100vh - 140px); }
    .sidebar { width: 260px; background: #141414; border-right: 1px solid #2a2a2a; padding: 24px 0; overflow-y: auto; }
    .sidebar .menu-item { padding: 12px 24px; color: #aaa; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: 0.2s; }
    .sidebar .menu-item:hover, .sidebar .menu-item.active { background: #d4af3710; color: #d4af37; border-left: 3px solid #d4af37; }
    .content { flex: 1; padding: 24px; overflow-y: auto; }
    .card { background: rgba(20,20,20,0.6); backdrop-filter: blur(8px); border: 1px solid #d4af3720; border-radius: 24px; padding: 20px; margin-bottom: 20px; }
    .card-title { font-size: 1.2rem; color: #d4af37; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .stat { background: #1a1a1a; border-radius: 18px; padding: 16px; border-left: 3px solid #d4af37; }
    .stat-label { font-size: 0.8rem; color: #aaa; text-transform: uppercase; }
    .stat-value { font-size: 2rem; font-weight: 600; color: white; }
    .badge { background: #d4af3720; border: 1px solid #d4af37; color: #d4af37; padding: 4px 10px; border-radius: 40px; font-size: 0.75rem; display: inline-block; }
    .alert-badge { background: #b85a3a30; border-color: #b85a3a; color: #f0a58b; }
    .btn-gold { background: #d4af3720; border: 1px solid #d4af37; color: #d4af37; padding: 10px 20px; border-radius: 40px; cursor: pointer; font-size: 0.9rem; }
    .btn-gold:hover { background: #d4af3740; }
    .btn-small { background: transparent; border: 1px solid #d4af37; color: #d4af37; border-radius: 30px; padding: 6px 12px; font-size: 0.8rem; cursor: pointer; }
    .table { width: 100%; border-collapse: collapse; }
    .table th { text-align: left; color: #d4af37; padding: 8px 0; border-bottom: 1px solid #2a2a2a; }
    .table td { padding: 8px 0; border-bottom: 1px solid #2a2a2a; }
    .farm-selector { margin-bottom: 16px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .alerts-panel { max-height: 200px; overflow-y: auto; }
    .hidden { display: none !important; }
    .flex-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .expandable { cursor: pointer; user-select: none; }
    .expandable-content { margin-top: 12px; }
    .modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); display: none; align-items: center; justify-content: center; z-index: 2000; }
    .modal-card { background: #1a1a1a; border: 1px solid #d4af3740; border-radius: 32px; padding: 24px; width: 90%; max-width: 500px; max-height: 80vh; overflow-y: auto; }
    .modal-card h3 { color: #d4af37; margin-bottom: 20px; }
    .cost-input { display: flex; justify-content: space-between; align-items: center; margin: 12px 0; }
    .cost-input label { color: #ccc; }
    .cost-input input, .cost-input select { width: 180px; background: #2a2a2a; border: 1px solid #d4af3740; border-radius: 30px; padding: 8px 12px; color: white; }
  </style>
</head>
<body>
<div id="app">
  <div class="header glass">
    <h1><i class="fas fa-feather"></i> The Golden Feather</h1>
    <div class="user-info">
      <span id="userDisplay"></span>
      <select id="farmSelector" class="hidden"></select>
      <button id="logoutBtn" class="btn-small">Logout</button>
    </div>
  </div>
  <div class="main-content">
    <div class="sidebar" id="sidebar"></div>
    <div class="content" id="contentArea"></div>
  </div>
</div>

<!-- Login Modal -->
<div id="loginModal" class="modal-overlay" style="display: flex;">
  <div class="modal-card">
    <h3>Login to Golden Feather</h3>
    <div class="cost-input"><label>Email</label><input type="email" id="loginEmail" value="admin@example.com"></div>
    <div class="cost-input"><label>Password</label><input type="password" id="loginPassword" value="any"></div>
    <div class="cost-input"><label>Role (demo)</label>
      <select id="loginRole">
        <option value="admin">Admin</option>
        <option value="manager">Farm Manager</option>
        <option value="staff">Staff</option>
        <option value="auditor">Auditor</option>
      </select>
    </div>
    <div class="flex-row" style="justify-content: flex-end; margin-top: 20px;">
      <button class="btn-gold" id="loginBtn">Sign In</button>
    </div>
    <p class="helper-text" style="margin-top:16px;">Demo: any password works. Role determines access.</p>
  </div>
</div>

<!-- Farm Creation Modal (admin only) -->
<div id="farmModal" class="modal-overlay">
  <div class="modal-card">
    <h3>➕ Create New Farm</h3>
    <div class="cost-input"><label>Farm Name</label><input type="text" id="newFarmName" placeholder="e.g. Sunrise Farm"></div>
    <div class="cost-input"><label>Location</label><input type="text" id="newFarmLocation" placeholder="e.g. Mpumalanga"></div>
    <div class="cost-input"><label>Manager Email</label><input type="email" id="newFarmManagerEmail" placeholder="manager@example.com"></div>
    <div class="flex-row" style="justify-content: flex-end;">
      <button class="btn-small" id="cancelFarmBtn">Cancel</button>
      <button class="btn-gold" id="saveFarmBtn">Create Farm</button>
    </div>
  </div>
</div>

<script>
  // ---------- Global State & Mock Data ----------
  const STORAGE_KEY = 'golden_feather_data';
  let appState = {
    currentUser: null,
    farms: [],
    users: [],
    batches: [],
    dailyOps: [],
    inventory: [],
    deliveries: [],
    laborShifts: [],
    equipmentLogs: [],
    alerts: [],
    auditLogs: [],
    rewards: [],
    subscriptions: [],
    assurance: [],
    villageContracts: [],
    stockOfferings: [],
    marketingCampaigns: [],
    influencers: []
  };

  // Load from localStorage or initialize mock
  function loadState() {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      Object.assign(appState, JSON.parse(saved));
    } else {
      initMockData();
    }
  }
  function saveState() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(appState));
  }

  function initMockData() {
    const farm1 = { id: 'f1', name: 'Sunrise Farm', location: 'Mpumalanga', manager_id: 'u2', config: {} };
    const farm2 = { id: 'f2', name: 'Green Valley', location: 'Limpopo', manager_id: 'u3', config: {} };
    appState.farms = [farm1, farm2];
    appState.users = [
      { id: 'u1', email: 'admin@example.com', full_name: 'Admin User', role: 'admin', farm_id: null },
      { id: 'u2', email: 'manager1@example.com', full_name: 'John Manager', role: 'manager', farm_id: 'f1' },
      { id: 'u3', email: 'manager2@example.com', full_name: 'Jane Manager', role: 'manager', farm_id: 'f2' },
      { id: 'u4', email: 'staff1@example.com', full_name: 'Staff One', role: 'staff', farm_id: 'f1' },
      { id: 'u5', email: 'auditor@example.com', full_name: 'Auditor', role: 'auditor', farm_id: null }
    ];
    appState.batches = [
      { id: 'b1', farm_id: 'f1', batch_number: 'B2401', breed: 'Cornish', initial_count: 850, current_count: 820, purchase_date: '2025-02-12', expected_slaughter: '2025-04-15', status: 'active' },
      { id: 'b2', farm_id: 'f1', batch_number: 'B2402', breed: 'Ross', initial_count: 1250, current_count: 1240, purchase_date: '2025-02-28', expected_slaughter: '2025-05-01', status: 'active' },
      { id: 'b3', farm_id: 'f2', batch_number: 'B2403', breed: 'Free Range', initial_count: 600, current_count: 600, purchase_date: '2025-03-15', expected_slaughter: '2025-06-01', status: 'active' }
    ];
    appState.dailyOps = [
      { id: 'd1', farm_id: 'f1', batch_id: 'b1', date: '2025-03-20', deaths: 2, feed_used_kg: 150, labor_shifts: 2, notes: '' },
      { id: 'd2', farm_id: 'f1', batch_id: 'b2', date: '2025-03-20', deaths: 1, feed_used_kg: 210, labor_shifts: 2, notes: '' }
    ];
    appState.inventory = [
      { id: 'i1', farm_id: 'f1', item_name: 'Feed (50kg)', quantity: 45, unit: 'bags', reorder_level: 10 },
      { id: 'i2', farm_id: 'f1', item_name: 'Vaccine', quantity: 120, unit: 'doses', reorder_level: 50 },
      { id: 'i3', farm_id: 'f2', item_name: 'Feed (50kg)', quantity: 30, unit: 'bags', reorder_level: 10 }
    ];
    appState.deliveries = [
      { id: 'del1', farm_id: 'f1', batch_id: 'b1', customer_name: 'Spier Wines', quantity: 50, price_per_unit: 100, total_amount: 5000, delivery_date: '2025-03-19', status: 'delivered' }
    ];
    appState.laborShifts = [];
    appState.equipmentLogs = [];
    appState.alerts = [
      { id: 'a1', farm_id: 'f1', severity: 'warning', message: 'Mortality rate above 2% in batch B2401', resolved: false, created_at: '2025-03-20T10:00:00Z' }
    ];
    appState.auditLogs = [];
    // Additional modules initialized with minimal mock data
    appState.rewards = [
      { customerId: 101, name: 'Spier Wines', type: 'bulk', progress: 8, target: 10, status: 'active', expiry: '2025-04-15', discount: 8 }
    ];
    appState.subscriptions = [
      { id: 201, name: 'Spier Wines', tier: 'celeb', monthlyQty: 15, price: 115, total: 1725, holidayAlloc: 20, depositPaid: 500, vip: true }
    ];
    appState.assurance = [
      { id: 1, name: 'Spier Wines', active: true, monthlyContribution: 1200, totalAllocated: 30, pendingClaim: 0, loyaltyCredits: 180 }
    ];
    appState.villageContracts = [
      { id: 1, farm: 'Mvula Poultry', village: 'Lwandle', chickens: 800, margin: 12, start: '2025-01-01', end: '2025-06-30', signed: true }
    ];
    appState.stockOfferings = [
      { id: 1, name: 'Batch B2401 · Cornish', sharesTotal: 1000, sharesSold: 680, sharePrice: 70, raised: 47600, expectedDividend: 7140, status: 'active' }
    ];
    appState.marketingCampaigns = [
      { name: 'Easter Special', platform: 'Facebook', revenue: 3800, spent: 1200, roi: 217, status: 'active' }
    ];
    appState.influencers = [
      { name: 'Thembi Khumalo', platform: 'Instagram', revenue: 2800, orders: 22, commission: 10, payout: 280 }
    ];
    saveState();
  }

  loadState();

  // ---------- Helper Functions ----------
  function getUserById(id) {
    return appState.users.find(u => u.id === id);
  }

  function getFarmsForUser(user) {
    if (!user) return [];
    if (user.role === 'admin' || user.role === 'auditor') return appState.farms;
    return appState.farms.filter(f => f.id === user.farm_id);
  }

  function canAccessFarm(user, farmId) {
    if (!user) return false;
    if (user.role === 'admin' || user.role === 'auditor') return true;
    return user.farm_id === farmId;
  }

  // Generate a new UUID
  function uuid() { return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => { let r = Math.random()*16|0, v = c == 'x' ? r : (r&0x3|0x8); return v.toString(16); }); }

  // Log audit action
  function logAudit(action, details = {}) {
    if (!appState.currentUser) return;
    const log = {
      id: uuid(),
      user_id: appState.currentUser.id,
      farm_id: appState.currentUser.farm_id,
      action,
      details,
      ip_address: '127.0.0.1',
      timestamp: new Date().toISOString()
    };
    appState.auditLogs.push(log);
    saveState();
  }

  // Real-time sync simulation: every 10 seconds, update some metrics
  setInterval(() => {
    if (!appState.currentUser) return;
    // Simulate new data from farms (e.g., increment deaths slightly)
    appState.batches.forEach(b => {
      if (b.status === 'active' && Math.random() > 0.7) {
        b.current_count = Math.max(0, b.current_count - 1);
      }
    });
    // Generate alerts if mortality high
    appState.batches.forEach(b => {
      const batchOps = appState.dailyOps.filter(op => op.batch_id === b.id);
      const recentDeaths = batchOps.slice(-3).reduce((sum, op) => sum + (op.deaths || 0), 0);
      if (recentDeaths > 5) {
        const existing = appState.alerts.find(a => a.farm_id === b.farm_id && a.message.includes(b.batch_number) && !a.resolved);
        if (!existing) {
          appState.alerts.push({
            id: uuid(),
            farm_id: b.farm_id,
            severity: 'warning',
            message: `High mortality (${recentDeaths} deaths) in batch ${b.batch_number}`,
            resolved: false,
            created_at: new Date().toISOString()
          });
        }
      }
    });
    // Re-render if current pane is dashboard
    const activePane = document.querySelector('.menu-item.active')?.dataset.pane;
    if (activePane) renderPane(activePane);
    saveState();
  }, 10000);

  // ---------- UI Rendering ----------
  const sidebar = document.getElementById('sidebar');
  const contentArea = document.getElementById('contentArea');
  const farmSelector = document.getElementById('farmSelector');
  const userDisplay = document.getElementById('userDisplay');
  const logoutBtn = document.getElementById('logoutBtn');
  const loginModal = document.getElementById('loginModal');
  const loginBtn = document.getElementById('loginBtn');
  const farmModal = document.getElementById('farmModal');

  let currentFarmId = null; // for admin/auditor selected farm

  function renderSidebar() {
    if (!appState.currentUser) return;
    const user = appState.currentUser;
    let menuItems = [];

    // Common items for all roles
    menuItems.push({ id: 'dashboard', icon: 'chart-pie', label: 'Dashboard' });
    menuItems.push({ id: 'inventory', icon: 'egg', label: 'Inventory' });
    menuItems.push({ id: 'sales', icon: 'cash-register', label: 'Sales' });
    menuItems.push({ id: 'logistics', icon: 'truck', label: 'Logistics' });
    menuItems.push({ id: 'budget', icon: 'chart-line', label: 'Budget' });

    // Additional modules based on role
    if (user.role === 'admin' || user.role === 'manager') {
      menuItems.push({ id: 'settings', icon: 'sliders-h', label: 'Settings' });
      menuItems.push({ id: 'rewards', icon: 'gift', label: 'Rewards' });
      menuItems.push({ id: 'infra', icon: 'hard-hat', label: 'Infrastructure' });
      menuItems.push({ id: 'crm', icon: 'users', label: 'CRM' });
      menuItems.push({ id: 'festive', icon: 'people-group', label: 'Festive Plan' });
      menuItems.push({ id: 'subscription', icon: 'calendar-check', label: 'Subscription' });
      menuItems.push({ id: 'assurance', icon: 'shield-alt', label: 'Assurance' });
      menuItems.push({ id: 'villageExpansion', icon: 'handshake', label: 'Village Expansion' });
      menuItems.push({ id: 'stockSale', icon: 'chart-line', label: 'Stock Sale' });
      menuItems.push({ id: 'marketing', icon: 'bullhorn', label: 'Marketing' });
    }

    if (user.role === 'admin') {
      menuItems.push({ id: 'audit', icon: 'history', label: 'Audit Log' });
      menuItems.push({ id: 'admin', icon: 'crown', label: 'Admin Controls' });
    }

    sidebar.innerHTML = menuItems.map(item => `
      <div class="menu-item" data-pane="${item.id}">
        <i class="fas fa-${item.icon}"></i> <span>${item.label}</span>
      </div>
    `).join('');

    // Attach click handlers
    document.querySelectorAll('.menu-item').forEach(el => {
      el.addEventListener('click', () => {
        document.querySelectorAll('.menu-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
        renderPane(el.dataset.pane);
      });
    });

    // Activate first item
    const first = document.querySelector('.menu-item');
    if (first) {
      first.classList.add('active');
      renderPane(first.dataset.pane);
    }
  }

  function renderFarmSelector() {
    const farms = getFarmsForUser(appState.currentUser);
    if (farms.length > 1 || appState.currentUser.role === 'admin' || appState.currentUser.role === 'auditor') {
      farmSelector.classList.remove('hidden');
      farmSelector.innerHTML = '<option value="">All Farms</option>' + farms.map(f => `<option value="${f.id}" ${currentFarmId === f.id ? 'selected' : ''}>${f.name}</option>`).join('');
      farmSelector.onchange = (e) => {
        currentFarmId = e.target.value || null;
        const activePane = document.querySelector('.menu-item.active')?.dataset.pane;
        renderPane(activePane);
      };
    } else {
      farmSelector.classList.add('hidden');
      if (farms.length === 1) currentFarmId = farms[0].id;
    }
  }

  function renderPane(paneId) {
    if (!appState.currentUser) return;
    const user = appState.currentUser;
    const farms = getFarmsForUser(user);
    const targetFarmId = currentFarmId || (farms.length === 1 ? farms[0].id : null);

    // Role-based access control on pane level
    if (paneId === 'audit' && user.role !== 'admin') {
      contentArea.innerHTML = '<div class="card"><p>Access denied.</p></div>';
      return;
    }

    // Call specific render function
    const renderers = {
      dashboard: () => renderDashboard(targetFarmId),
      inventory: () => renderInventory(targetFarmId),
      sales: () => renderSales(targetFarmId),
      logistics: () => renderLogistics(targetFarmId),
      budget: () => renderBudget(targetFarmId),
      settings: () => renderSettings(targetFarmId),
      rewards: () => renderRewards(targetFarmId),
      infra: () => renderInfra(targetFarmId),
      crm: () => renderCRM(targetFarmId),
      festive: () => renderFestive(targetFarmId),
      subscription: () => renderSubscription(targetFarmId),
      assurance: () => renderAssurance(targetFarmId),
      villageExpansion: () => renderVillageExpansion(targetFarmId),
      stockSale: () => renderStockSale(targetFarmId),
      marketing: () => renderMarketing(targetFarmId),
      audit: () => renderAudit(),
      admin: () => renderAdminControls()
    };

    if (renderers[paneId]) renderers[paneId]();
    else contentArea.innerHTML = '<div class="card"><p>Pane not found.</p></div>';
  }

  // ---------- Dashboard (Central / Farm) ----------
  function renderDashboard(farmId) {
    const user = appState.currentUser;
    const farms = farmId ? appState.farms.filter(f => f.id === farmId) : appState.farms;
    const isAdminView = !farmId && user.role === 'admin';

    let html = `<div class="farm-selector">${isAdminView ? '<span class="badge">Central Admin View</span>' : ''}</div>`;

    // Aggregated KPIs for admin
    if (isAdminView) {
      const totalBirds = appState.batches.reduce((sum, b) => sum + b.current_count, 0);
      const totalSold = appState.deliveries.reduce((sum, d) => sum + d.quantity, 0);
      const totalRevenue = appState.deliveries.reduce((sum, d) => sum + d.total_amount, 0);
      const totalFarms = appState.farms.length;
      html += `
        <div class="card">
          <div class="card-title"><i class="fas fa-eye"></i> Global Overview</div>
          <div class="grid-2">
            <div class="stat"><span class="stat-label">Total Birds</span><div class="stat-value">${totalBirds}</div></div>
            <div class="stat"><span class="stat-label">Total Sold</span><div class="stat-value">${totalSold}</div></div>
            <div class="stat"><span class="stat-label">Total Revenue</span><div class="stat-value">R ${totalRevenue.toLocaleString()}</div></div>
            <div class="stat"><span class="stat-label">Active Farms</span><div class="stat-value">${totalFarms}</div></div>
          </div>
        </div>
        <div class="card">
          <div class="card-title expandable" onclick="toggleExpand(this)"><i class="fas fa-chevron-down"></i> Farms Summary</div>
          <div class="expandable-content">
            ${appState.farms.map(f => {
              const farmBirds = appState.batches.filter(b => b.farm_id === f.id).reduce((s, b) => s + b.current_count, 0);
              const farmRevenue = appState.deliveries.filter(d => d.farm_id === f.id).reduce((s, d) => s + d.total_amount, 0);
              return `<div class="batch-row" style="display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid #2a2a2a;">
                <span><strong>${f.name}</strong> (${f.location})</span>
                <span>🐔 ${farmBirds} birds | R ${farmRevenue.toLocaleString()}</span>
                <button class="btn-small" onclick="drillToFarm('${f.id}')">Drill Down</button>
              </div>`;
            }).join('')}
          </div>
        </div>
      `;
    }

    // Farm-specific dashboard (if farm selected or manager view)
    if (farmId) {
      const farm = appState.farms.find(f => f.id === farmId);
      const farmBatches = appState.batches.filter(b => b.farm_id === farmId);
      const farmDeliveries = appState.deliveries.filter(d => d.farm_id === farmId);
      const totalBirds = farmBatches.reduce((s, b) => s + b.current_count, 0);
      const todayDeliveries = farmDeliveries.filter(d => d.delivery_date === new Date().toISOString().split('T')[0]);
      const todayRevenue = todayDeliveries.reduce((s, d) => s + d.total_amount, 0);

      html += `
        <div class="card">
          <div class="card-title"><i class="fas fa-chart-line"></i> ${farm.name} Dashboard</div>
          <div class="grid-2">
            <div class="stat"><span class="stat-label">Total Birds</span><div class="stat-value">${totalBirds}</div></div>
            <div class="stat"><span class="stat-label">Today's Sales</span><div class="stat-value">${todayDeliveries.length}</div><span class="stat-sub">R ${todayRevenue}</span></div>
            <div class="stat"><span class="stat-label">Active Batches</span><div class="stat-value">${farmBatches.length}</div></div>

  window.toggleExpand = function(el) {
    const content = el.nextElementSibling;
    const icon = el.querySelector('i');
    if (content.style.display === 'none') {
      content.style.display = 'block';
      icon.className = 'fas fa-chevron-down';
    } else {
      content.style.display = 'none';
      icon.className = 'fas fa-chevron-right';
    }
  };

  window.showFarmModal = function() {
    farmModal.style.display = 'flex';
  };
  document.getElementById('cancelFarmBtn').addEventListener('click', () => farmModal.style.display = 'none');
  document.getElementById('saveFarmBtn').addEventListener('click', () => {
    const name = document.getElementById('newFarmName').value;
    const location = document.getElementById('newFarmLocation').value;
    const managerEmail = document.getElementById('newFarmManagerEmail').value;
    if (!name) return alert('Farm name required');
    const newFarm = { id: uuid(), name, location, manager_id: null, config: {} };
    appState.farms.push(newFarm);
    // Create manager user if email provided
    if (managerEmail) {
      const managerId = uuid();
      appState.users.push({ id: managerId, email: managerEmail, full_name: 'Farm Manager', role: 'manager', farm_id: newFarm.id });
      newFarm.manager_id = managerId;
    }
    // Clone template: add default inventory items, etc.
    appState.inventory.push({ id: uuid(), farm_id: newFarm.id, item_name: 'Feed (50kg)', quantity: 0, unit: 'bags', reorder_level: 10 });
    appState.inventory.push({ id: uuid(), farm_id: newFarm.id, item_name: 'Vaccine', quantity: 0, unit: 'doses', reorder_level: 50 });
    saveState();
    logAudit('create_farm', { farm_id: newFarm.id, name });
    farmModal.style.display = 'none';
    renderFarmSelector();
    renderPane('admin');
  });

  window.pushUpdateToAllFarms = function() {
    // Simulate pushing a new batch size or pricing change
    alert('Pushed update to all farms (mock).');
    logAudit('push_update', { message: 'Global settings updated' });
  };

  window.editUser = function(userId) {
    alert('Edit user ' + userId);
  };

  // ---------- Login & Logout ----------
  loginBtn.addEventListener('click', () => {
    const email = document.getElementById('loginEmail').value;
    const role = document.getElementById('loginRole').value;
    // Find or create user
    let user = appState.users.find(u => u.email === email);
    if (!user) {
      // Create demo user with selected role
      user = { id: uuid(), email, full_name: email.split('@')[0], role, farm_id: role === 'manager' ? 'f1' : (role === 'staff' ? 'f1' : null) };
      appState.users.push(user);
      saveState();
    }
    appState.currentUser = user;
    userDisplay.innerText = `${user.full_name} (${user.role})`;
    loginModal.style.display = 'none';
    renderSidebar();
    renderFarmSelector();
    logAudit('login', { email });
  });

  logoutBtn.addEventListener('click', () => {
    logAudit('logout', {});
    appState.currentUser = null;
    loginModal.style.display = 'flex';
    sidebar.innerHTML = '';
    contentArea.innerHTML = '';
    farmSelector.classList.add('hidden');
    userDisplay.innerText = '';
  });

  // Initialize if already logged in (from localStorage)
  if (appState.currentUser) {
    userDisplay.innerText = `${appState.currentUser.full_name} (${appState.currentUser.role})`;
    loginModal.style.display = 'none';
    renderSidebar();
    renderFarmSelector();
  }
